name: brasileirao-bi pipeline

on:
  schedule:
    - cron: "0 2 * * 2"
    - cron: "0 2 * * 5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write GCP credentials
        shell: bash
        run: |
          mkdir -p secrets
          echo '${{ secrets.GCP_SA_KEY_JSON }}' > secrets/brasileirao-bi-sa.json

      - name: Run pipeline
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          GOOGLE_APPLICATION_CREDENTIALS: secrets/brasileirao-bi-sa.json
          BQ_LOCATION: southamerica-east1
        run: |
          PYTHONPATH=src python -m brasileirao_bi.etl.pipeline --all